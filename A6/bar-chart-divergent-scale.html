<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Speed Diverging Bar Chart</title>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .axis-x path,
        .axis-y path {
            fill: none;
            stroke: black;
            shape-rendering: crispEdges;
        }

        .axis-x .tick line,
        .axis-y .tick line {
            stroke: #858585;
        }

        .axis text {
            font-size: 12px;
        }
        
        .axis-label {
            font-size: 14px;
            font-weight: bold;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }
        
        .legendTitle {
            font-size: 14px;
            font-weight: bold;
        }

        .zero-line {
            stroke: black;
            stroke-width: 1.5px;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script>
        /** Code written originally, using previous own assignments as reference;
         * D3 legend documentation used for new concepts */
        
        // set up container with margins
        const svgWidth = 900;
        const svgHeight = 600; 
        const margin = { 
            top: 50, 
            right: 150, 
            bottom: 50, 
            left: 100 
        };
        const width = svgWidth - margin.left - margin.right;
        const height = svgHeight - margin.top - margin.bottom;

        const svg = d3.select("#chart-container")
            .append("svg")
            .attr("width", svgWidth)
            .attr("height", svgHeight)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // read data
        d3.csv("pokemon.csv").then(function(data) {
            
            data.forEach(d => {
                d.speed = +d.speed;
            });

            // get avg for speed
            const avgSpeed = d3.mean(data, d => d.speed);

            // for each data point, find difference from avg
            data.forEach(d => {
                d.speedDiff = d.speed - avgSpeed;
            });
            
            // sort by the difference from avg
            data.sort((a, b) => b.speedDiff - a.speedDiff);

            // find highest divergence using absolute value to set up x axis
            const maxDiff = d3.max(data, d => Math.abs(d.speedDiff));

            // define x-axis (difference from avg speed)
            const x = d3.scaleLinear()
                .domain([-maxDiff, maxDiff])
                .nice() 
                .range([0, width]);

            // define y-axis (name)
            const y = d3.scaleBand()
                .domain(data.map(d => d.pokemon))
                .range([0, height])
                .padding(0.15); 

            // define color scale
            const colorScale = d3.scaleDiverging(d3.interpolateRdYlGn)
                .domain([-60, 0, 60]);

            // add x-axis
            svg.append("g")
                .attr("class", "axis axis-x")
                .attr("transform", `translate(0, ${height})`)
                .call(d3.axisBottom(x));

            // add y-axis
            svg.append("g")
                .attr("class", "axis axis-y")
                .call(d3.axisLeft(y));

            // x-axis midpoint line
            svg.append("line")
                .attr("class", "zero-line")
                .attr("x1", x(0))
                .attr("y1", 0)
                .attr("x2", x(0))
                .attr("y2", height);

            // add bars
            svg.selectAll(".bar")
                .data(data)
                .enter()
                .append("rect")
                .attr("class", "bar")
                .attr("x", d => d.speedDiff < 0 ? x(d.speedDiff) : x(0)) // if less than avg, start at x(difference), else start at center
                .attr("y", d => y(d.pokemon)) 
                .attr("width", d => Math.abs(x(d.speedDiff) - x(0))) // width is the distance between x(0) and x(diff)
                .attr("height", y.bandwidth())
                .style("fill", d => colorScale(d.speedDiff)); 
                
            // x-axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", height + margin.bottom - 10)
                .text("Difference from Average Speed");

            // y-axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .attr("y", -margin.left + 20)
                .attr("x", -height / 2)
                .text("Pokemon");
                
            // title
            svg.append("text")
                .attr("class", "title")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", -margin.top / 2) 
                .text("Gen 1 Pokemon Speed vs. Average");

            // define legend
            svg.append("g")
                .attr("class", "legendDiverging")
                .attr("transform", `translate(${width + 20}, 20)`);

            // set up legend
            const legendDiverging = d3.legendColor()
                .shapeWidth(25)
                .cells(5) 
                .orient("vertical")
                .scale(colorScale)
                .title("Speed vs. Avg")
                .labelFormat(d3.format("+.0f"));

            // call legend
            svg.select(".legendDiverging")
                .call(legendDiverging);
        });
    </script>
</body>
</html>
